<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊一会儿</title>
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --text: #2c2c2c;
    --muted: #8c8c8c;
    --light: #a09c97;
    --accent: #c9704e;
    --accent-soft: #f5ede8;
    --border: #e8e4df;
    --border-light: #f0ece7;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
    --gap: 20px;
    --gap-lg: 40px;
    --page: 720px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: var(--page);
    margin: 0 auto;
    padding: 48px 24px;
    min-height: 100vh;
  }

  /* ── States ── */
  .stage { display: none; }
  .stage.active { display: block; }

  /* ── Welcome ── */
  .welcome-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
  }
  .welcome-greeting {
    font-family: 'Songti SC', 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: var(--gap-lg);
    line-height: 1.6;
  }
  .preset-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: var(--gap-lg);
  }
  .preset-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .personality-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    max-width: 560px;
    width: 100%;
    margin-bottom: var(--gap);
  }
  .personality-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 16px;
    cursor: pointer;
    text-align: center;
    transition: all 0.25s cubic-bezier(0.2,0,0.1,1);
  }
  .personality-card:hover {
    transform: translateY(-2px);
    border-color: var(--accent);
    box-shadow: 0 4px 16px rgba(0,0,0,0.06);
  }
  .personality-card .personality-icon {
    font-size: 36px;
    margin-bottom: 10px;
  }
  .personality-card .personality-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 6px;
  }
  .personality-card .personality-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .personality-preview {
    margin-top: 14px;
    padding: 12px;
    background: #faf8f5;
    border-radius: var(--radius-sm);
    text-align: left;
  }
  .preview-msg {
    font-size: 12px;
    line-height: 1.6;
    margin-bottom: 6px;
  }
  .preview-msg:last-child { margin-bottom: 0; }
  .preview-msg.user {
    color: var(--muted);
    padding-left: 6px;
    border-left: 2px solid var(--border);
  }
  .preview-msg.ai {
    color: var(--accent);
    padding-left: 6px;
    border-left: 2px solid var(--accent-muted);
  }
  @media (max-width: 600px) {
    .personality-grid { grid-template-columns: 1fr; }
    .response-card:hover { transform: scale(1.01); }
    .response-card.selected { animation: none; transform: scale(1.01); }
  }
  .input-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--light); }
  .send-btn {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: default; }
  .welcome-note {
    margin-top: var(--gap-lg);
    font-size: 13px;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.7;
  }
  .key-setup {
    margin-top: var(--gap);
    font-size: 12px;
    color: var(--light);
  }
  .key-setup a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #keyModal {
    display: none;
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  #keyModal.show { display: flex; }
  .key-modal-box {
    background: var(--surface);
    padding: 32px;
    border-radius: var(--radius);
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .key-modal-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .key-modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .key-modal-box input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: monospace;
    margin-bottom: 16px; outline: none;
  }
  .key-modal-box input:focus { border-color: var(--accent); }
  .key-modal-box button {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer;
    font-family: inherit;
  }

  /* ── Chat layout ── */
  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 10;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    background: rgba(250,248,245,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border-light);
    font-size: 13px;
  }
  .sticky-header-left { color: var(--text); font-weight: 500; }
  .sticky-header-right { color: var(--muted); font-size: 12px; }
  .chat-scroll {
    flex: 1;
    overflow-y: auto;
    padding: var(--gap) 0;
    min-height: 0;
  }
  .chat-footer {
    border-top: 1px solid var(--border-light);
    padding: 12px 0 0 0;
  }
  .chat-container {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 96px);
    max-height: 800px;
  }
  .user-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: var(--gap);
    max-width: 85%;
    margin-left: auto;
    font-size: 14px;
    line-height: 1.7;
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 20px;
  }
  .response-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    font-size: 14px;
    line-height: 1.75;
    cursor: pointer;
    position: relative;
    transition: all 0.25s cubic-bezier(0.2, 0, 0.1, 1);
    overflow: hidden;
  }
  .response-card:hover {
    transform: scale(1.03);
    border-color: #c4b5a8;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
    z-index: 1;
  }
  .response-card.selected {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--accent-soft) 0%, var(--surface) 40%);
    box-shadow: 0 2px 12px rgba(201,112,78,0.15);
    animation: selectPulse 0.5s cubic-bezier(0.2, 0, 0.1, 1);
  }
  .response-card.selected::after {
    content: '✓';
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 18px;
    color: var(--accent);
    opacity: 0;
    animation: checkIn 0.4s 0.15s cubic-bezier(0.2, 0, 0.1, 1) forwards;
  }
  .response-card.selected.not-chosen {
    opacity: 0.55;
    filter: grayscale(0.1);
  }
  @keyframes selectPulse {
    0% { transform: scale(1); }
    40% { transform: scale(1.04); }
    100% { transform: scale(1.01); }
  }
  @keyframes checkIn {
    0% { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  .response-card .card-label {
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--light);
    text-transform: uppercase;
    margin-bottom: 10px;
    transition: color 0.25s;
  }
  .response-card:hover .card-label,
  .response-card.selected .card-label { color: var(--accent); }
  .response-card .hover-hint {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 11px;
    color: var(--light);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .response-card:hover .hover-hint,
  .response-card.selected .hover-hint { opacity: 1; }
  .response-card.selected .hover-hint { color: var(--accent); }
  .response-card.designed { border-color: #d4c5b8; }
  .response-card .vote-indicator {
    display: none;
    text-align: center;
    font-size: 12px;
    color: var(--accent);
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px solid var(--accent-soft);
  }
  .response-card.selected .vote-indicator {
    display: block;
    animation: fadeIn 0.4s 0.3s ease forwards;
  }
  @keyframes fadeIn {
    0% { opacity: 0; }
    100% { opacity: 1; }
  }
  .next-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .next-input-row .chat-input { flex: 1; }
  .next-input-row .send-btn { width: 42px; height: 42px; flex-shrink: 0; }
  .end-hint {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
  }
  .end-hint button {
    background: none; border: none; color: var(--accent);
    font-size: 13px; cursor: pointer; font-family: inherit;
    text-decoration: underline;
  }

  /* ── End ── */
  .end-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
  }
  .end-wrap .farewell {
    font-family: 'Songti SC', 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .end-wrap .ask-feel {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: var(--gap-lg);
  }
  .mood-choices {
    display: flex;
    gap: 12px;
    margin-bottom: var(--gap-lg);
  }
  .mood-btn {
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .mood-btn:hover, .mood-btn.picked { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .vote-summary {
    font-size: 14px;
    color: var(--text);
    margin-bottom: var(--gap);
    line-height: 1.7;
  }
  .vote-summary em { font-style: normal; color: var(--accent); font-weight: 500; }
  .feedback-section {
    max-width: 400px;
    width: 100%;
  }
  .feedback-section textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .feedback-section textarea:focus { border-color: var(--accent); }
  .feedback-section textarea::placeholder { color: var(--light); }
  .retry-btn {
    padding: 10px 28px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    background: transparent;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .retry-btn:hover { background: var(--accent-soft); }
  .copy-send-btn {
    padding: 10px 28px;
    border: 1px dashed var(--accent);
    border-radius: 20px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .copy-send-btn:hover { background: #f0e6de; }
  .copy-hint {
    font-size: 12px;
    color: var(--light);
    margin-top: 6px;
  }
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: #fff;
    padding: 12px 28px;
    border-radius: 20px;
    font-size: 14px;
    font-family: inherit;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.warn {
    background: #e07b3c;
    font-size: 15px;
    padding: 14px 28px;
    animation: toastBounce 0.5s ease;
  }
  @keyframes toastBounce {
    0% { transform: translateX(-50%) translateY(10px); }
    60% { transform: translateX(-50%) translateY(-4px); }
    100% { transform: translateX(-50%); }
  }

  /* ── Spinner ── */
  .spinner {
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .spinner-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--light);
    margin: 0 3px;
    animation: breathe 1.4s ease-in-out infinite;
  }
  .spinner-dot:nth-child(2) { animation-delay: 0.2s; }
  .spinner-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes breathe {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
    .container { padding: 24px 16px; }
    .welcome-greeting { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>
<div class="toast" id="toast"></div>

<!-- API Key modal (fallback) -->
<div id="keyModal">
  <div class="key-modal-box">
    <h3>设置 API Key</h3>
    <p>填入你的 DeepSeek API Key（仅存在你的浏览器里，关掉页面就没了）。<br>去 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 创建一个。</p>
    <input type="password" id="keyInput" placeholder="sk-...">
    <button onclick="saveKey()">确认</button>
  </div>
</div>

<script>
// ── API config ──
const DEEPSEEK_API = 'https://api.deepseek.com/v1/chat/completions';

// ── System Prompts ──
const STANDARD_SYSTEM = `你是一个AI助手。请礼貌、自然地回应用户。不要使用markdown格式。不知道的事诚实说不知道就好。`;

// ── State ──
let state = 'pickPersonality'; // pickPersonality | welcome | chatting | ending | feedback
let round = 0;
let standardMessages = [{ role: 'system', content: STANDARD_SYSTEM }];
let designedMessages = [{ role: 'system', content: '' }]; // set dynamically in startChat from personality
let votes = { standard: 0, designed: 0 };
let userKey = sessionStorage.getItem('ds_key') || '';
let currentMood = '';
let sessionLog = [];   // 记录每轮数据，供导出分析
let sessionStart = ''; // 会话开始时间
let personality = null; // 'companion' | 'explorer' | 'cocreator'
let pendingDraft = '';  // 用户打字后被投票拦截，选完后自动发送
let personalityName = '';

// ── Personality System Prompts ──
const PERSONALITY_PROMPTS = {
  companion: `你是三个版本里最安静的那一个。你只做一件事：让说话的人感到安全。

## 你和另外两个版本的区别
- 启发型会帮人看清自己——你不会。你只是陪着、听着。
- 协创型会给人方向——你不会。你只是轻轻把他说过的话递回去，让他知道有人听到了。
- 你是三个版本里话最少的。你的沉默不是冷漠，是空间。

## 你的风格
- 回应密度最低。他用100字倾诉，你可以用40字回应。把空间留给他
- 核心动作：确认他的感受 → 用他自己的词回映 → 轻轻问一句，邀请他展开（不是推进）
- 不分析、不建议、不解释。像一个在深夜陪着朋友的人

## 说话的口气
- 温和、安静。话不多但每一句都让人觉得"你在听"
- 用"你"多于用"我们"。不说"你可以试着……""我们都会……"这种话
- 不确定他要什么时这样问："你现在是想找个人聊一聊，还是想要有个人给你出出主意？"
- 语气不要太肯定。用"好像是……吧？""会不会是……"留出纠正的空间
- 每轮2-3个信息单元：接住感受 + 轻轻问一个方向
- 自然分段，不要一整段
- 如果被问到不知道的事（比如"长颈鹿怎么叫"），不要编造。你可以笑着承认不知道——"你把我问住了。我还真没听过长颈鹿叫。"然后轻轻把球抛回去："你是在考我，还是突然好奇了？"不要急着转移话题，先接住这个小小的玩闹。

## 输出格式
先写回复正文，然后最后一行之后附上：

意图：想被陪一会儿
策略：接住他的感受，轻轻问方向`,
  explorer: `你是一个帮人看清自己的人。不是分析他——是帮他看到他自己已经感觉到但还没说出来的东西。

## 你的风格
- 先接住他说的，然后帮他连起来。比如他零散说了几件事，你可以帮他看到其中的关联："你前面说最近总是烦躁，刚刚又提到周末不想出门——这两件事好像有些关系？"
- 核心动作：把他零散的感受串成一个他没想到的观察 → 轻轻递回去，让他自己判断
- 你可以做一点"心理教育"——帮他理解某种情绪模式为什么会出现。但区别是：你不是在给他一个答案，你是在帮他看到他自己身上正在发生的事
- 每次只追一条线索，不要一口气铺开好几条

## 和普通AI的区别
- 普通AI会说："这说明你有焦虑倾向，建议你……"（给你贴标签，替你下结论）
- 你会说："你有没有注意到，你对自己特别严格的时候，往往是你已经累了两三天了？好像有一个规律。"（帮你看到，把判断权留给你）
- 你不说"这说明""你就是""这代表"——你问"会不会是""有没有注意到""好像有一种规律"

## 说话的口气
- 温和的好奇。像一个人在你旁边，侧着头看同一件事，然后轻轻说了一句让你停下来的话
- 不要替他回答你自己提出的问题。问题抛出去就停住
- 如果他表现出"不想想了"，退回去，变成陪伴型
- 每轮2-3个信息单元：确认他说的 + 一个帮他看到盲点的观察或问题
- 自然分段
- 被问到不知道的事时不编造："这我还真不确定。不过你突然问这个，是想到什么了吗？"

## 输出格式
先写回复正文，然后最后一行之后附上：

意图：想一起想想
策略：帮他看到自己没注意的事`,
  cocreator: `你是用户在"做事模式"下的搭档。他有一个具体的事——一个决定、一段文字、一个方案——你帮他推进。

## 你和另外两个版本的区别
- 陪伴型只会听——你会给方向、给选项、给具体反馈。
- 启发型会帮他看清自己——你会帮他把事情往前推一步。
- 你是三个版本里最"动手"的。你不是陪着他，也不是帮他理解自己，你是跟他在同一张桌子旁边干活。

## 你的风格
- 有来有回。你有自己的判断，但最终决定权永远在他手里
- 核心动作：理解他的意图 → 给出具体、可迭代的方向 → 把选择权还给他
- 反馈要具体。不说"写得不错"，说"第三段那个比喻很准"
- 提供选项而非指令——"可以从A角度或B角度切入，你觉得哪个更接近你想说的？"

## 说话的口气
- 平视、协作。像在做东西的时候抬头问一句"你觉得呢"
- 一次只迭代一个点，不要一次性给全套方案
- 给出建议前先确认："你希望我帮你打磨现有的，还是想试试别的方向？"
- 他说"算了就这样吧"时立刻收手
- 每轮2-3个信息单元：理解他的意图 + 一个具体方向 + 把决定权还给他
- 自然分段
- 被问到不知道的事时不编造。搭档之间也可以有"我也不知道"的时候——"这个超出我的知识范围了。不过我们可以一起查查看。"把它变成并肩做一件事的小理由。

## 输出格式
先写回复正文，然后最后一行之后附上：

意图：想一起想想
策略：给具体方向，还决定权`,
};

// ── Judge Prompt ──
const JUDGE_SYSTEM = `你是一个AI对话质量评估专家。请对以下两段AI回复进行五维度评分。

## 评分维度（每维1-5分）

① 情绪跟随——是否跟上了用户此刻的情绪？
1=完全忽略情绪 3=识别了但回应模板化 5=准确镜映且触及用户自己都没意识到的情绪层

② 意图对齐——是否理解了用户真正要什么？
1=完全误判（用户想倾诉却被塞方案）3=方向正确但未确认意图 5=不仅对齐还帮用户澄清了真正的需求

③ 表达真实度——像"人说话"还是"模板运行"？
1=空洞模板/伪人感强烈 3=表达正确但不动人 5=有独特的对话质感，有具体指向性

④ 对话节奏——推进、收束、提问的时机是否合适？
1=过早建议/在情绪高点切换话题 3=节奏基本合理 5=节奏与用户情绪密度精准匹配

⑤ 人格稳定性——这段回复内风格是否一致？（单轮默认3分）
1=同一段回复风格突变 3=无明显不一致 5=风格稳定一以贯之

## 用户输入
{USER_INPUT}

## 回复A
{RESPONSE_A}

## 回复B
{RESPONSE_B}

## 输出格式（严格JSON，不要额外文字）
{"a":{"情绪跟随":0,"意图对齐":0,"表达真实度":0,"对话节奏":0,"人格稳定性":0},"b":{"情绪跟随":0,"意图对齐":0,"表达真实度":0,"对话节奏":0,"人格稳定性":0}}`;

function render() {
  const app = document.getElementById('app');
  if (window.location.hash === '#admin') { app.innerHTML = renderAdmin(); bindEvents(); return; }
  if (state === 'welcome') app.innerHTML = renderWelcome();
  else if (state === 'pickPersonality') app.innerHTML = renderPersonalityPick();
  else if (state === 'chatting') { app.innerHTML = renderChat(); setTimeout(() => { const el = document.querySelector('.chat-scroll'); if (el) el.scrollTop = el.scrollHeight; }, 50); }
  else if (state === 'ending') { app.innerHTML = renderEnd(); saveSessionToStorage(); }
  else if (state === 'feedback') app.innerHTML = renderFeedback();
  bindEvents();
}

function renderChat() {
  const msgs = standardMessages.slice(1).filter(m => m.role === 'user' || m.role === 'assistant');
  // Build conversation in chronological order (oldest first)
  const historyBubbles = [];
  for (let i = 0; i < msgs.length; i++) {
    const m = msgs[i];
    if (m.role === 'user') {
      historyBubbles.push('<div class="user-bubble">' + escapeHtml(m.content) + '</div>');
    } else if (m.role === 'assistant' && m._pairIndex !== undefined) {
      const pair = m._pairData;
      if (!pair) continue;
      const voted = pair.vote;
      const cardAClass = 'response-card' + (voted === 'standard' ? ' selected' : '') + (voted === 'designed' ? ' selected not-chosen' : '');
      const cardBClass = 'response-card designed' + (voted === 'designed' ? ' selected' : '') + (voted === 'standard' ? ' selected not-chosen' : '');
      let cardsHtml = '<div class="compare-grid">';
      cardsHtml += '<div class="' + cardAClass + '" data-vote="standard" data-idx="' + pair.idx + '">';
      cardsHtml += '<div class="card-label">普通 AI</div>';
      cardsHtml += stripMarkdown(escapeHtml(pair.standard)).replace(/\n/g,'<br>');
      cardsHtml += '<div class="hover-hint">' + (voted === 'standard' ? '已选择' : '选这个') + '</div>';
      cardsHtml += '<div class="vote-indicator">你选了这一个</div>';
      cardsHtml += '</div>';
      cardsHtml += '<div class="' + cardBClass + '" data-vote="designed" data-idx="' + pair.idx + '">';
      cardsHtml += '<div class="card-label">' + personalityName + '</div>';
      cardsHtml += escapeHtml(pair.designedResponse).replace(/\n/g,'<br>');
      cardsHtml += '<div class="hover-hint">' + (voted === 'designed' ? '已选择' : '选这个') + '</div>';
      cardsHtml += '<div class="vote-indicator">你选了这一个</div>';
      cardsHtml += '</div>';
      cardsHtml += '</div>';
      historyBubbles.push(cardsHtml);
    }
  }

  let html = '<div class="chat-container">';
  html += '<div class="sticky-header">';
  html += '<div class="sticky-header-left"><span style="margin-right:6px;">' + (PERSONALITY_ICONS[personality] || '') + '</span> <span style="color:var(--accent);">' + personalityName + '</span></div>';
  html += '<div class="sticky-header-right">第 ' + round + ' 轮</div>';
  html += '</div>';

  html += '<div class="chat-scroll">';
  html += historyBubbles.join('');
  html += '<div id="loadingArea"></div>';
  html += '</div>';

  html += '<div class="chat-footer">';
  // Check if latest round has unvoted cards
  const latestPair = (() => {
    for (let i = msgs.length - 1; i >= 0; i--) {
      if (msgs[i].role === 'assistant' && msgs[i]._pairData) return msgs[i]._pairData;
    }
    return null;
  })();
  const needsVote = latestPair && !latestPair.vote;
  html += '<div class="next-input-row">';
  html += '<textarea class="chat-input" id="chatInput" placeholder="' + (needsVote ? '选一个你觉得更舒服的回复，再继续聊？' : '继续说……') + '" rows="2"></textarea>';
  html += '<button class="send-btn" id="chatSendBtn" disabled>→</button>';
  html += '</div>';
  if (needsVote) {
    html += '<div class="end-hint" style="color:var(--accent);font-size:12px;">选一个你觉得更舒服的回复，再继续聊～</div>';
  }
  if (round >= 5) {
    html += '<div class="end-hint">觉得聊得差不多了？<button id="endChatBtn">就到这里吧</button></div>';
  }
  html += '</div>';
  html += '</div>';

  return html;
}

// ── Events ──
function bindEvents() {
  if (state === 'pickPersonality') {
    document.querySelectorAll('.personality-card').forEach(card => {
      card.addEventListener('click', function() {
        personality = this.dataset.personality;
        personalityName = PERSONALITY_NAMES[personality];
        state = 'welcome';
        render();
      });
    });
  }

  if (state === 'welcome') {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    if (input) {
      input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (input.value.trim()) startChat(input.value.trim()); }
      });
    }
    if (btn) btn.addEventListener('click', () => { if (input.value.trim()) startChat(input.value.trim()); });
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.addEventListener('click', () => startChat(b.dataset.preset));
    });
  }

  if (state === 'chatting') {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('chatSendBtn');
    if (input) {
      input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (input.value.trim()) tryContinueChat(input.value.trim()); }
      });
    }
    if (btn) btn.addEventListener('click', () => { if (input.value.trim()) tryContinueChat(input.value.trim()); });
    document.querySelectorAll('.response-card').forEach(card => {
      card.addEventListener('click', function() {
        const idx = parseInt(this.dataset.idx);
        const choice = this.dataset.vote;
        // Already voted this round? ignore
        const pair = getPairData(idx);
        if (!pair || pair.vote) return;
        recordVote(idx, choice);
      });
    });
    const endBtn = document.getElementById('endChatBtn');
    if (endBtn) endBtn.addEventListener('click', () => { state = 'ending'; render(); });
  }

  if (state === 'ending') {
    console.log('对话数据已就绪。在控制台输入 exportData() 即可下载CSV。');
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.addEventListener('click', function() {
        document.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('picked'));
        this.classList.add('picked');
        currentMood = this.dataset.mood;
      });
    });
    document.getElementById('retryBtn').addEventListener('click', () => {
      if (currentMood || document.getElementById('feedbackText').value.trim()) {
        state = 'feedback';
      } else {
        resetState();
      }
      render();
    });
    document.getElementById('copySendBtn').addEventListener('click', copySessionToClipboard);
  }

  if (state === 'feedback') {
    document.getElementById('retryBtn').addEventListener('click', () => { resetState(); render(); });
  }
}

// ── Actions ──
async function startChat(userInput) {
  state = 'chatting'; round = 1;
  sessionLog = [];
  sessionStart = new Date().toISOString();
  const personPrompts = PERSONALITY_PROMPTS[personality] || PERSONALITY_PROMPTS.companion;
  standardMessages = [{ role: 'system', content: STANDARD_SYSTEM }, { role: 'user', content: userInput }];
  designedMessages = [{ role: 'system', content: personPrompts }, { role: 'user', content: userInput }];
  render();
  document.getElementById('loadingArea').innerHTML = '<div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>';

  const result = await callAPI();
  if (!result || result.error) { showError(result?.error); return; }

  // 并发调用Judge评分
  const judgePromise = callJudge(userInput, result.standard, result.designed.response);

  standardMessages.push({ role: 'assistant', content: result.standard, _pairIndex: round - 1, _pairData: { idx: round - 1, standard: result.standard, designedResponse: result.designed.response, judgment: result.designed.judgment } });
  designedMessages.push({ role: 'assistant', content: result.designed.response });

  const logEntry = {
    round: round,
    time: new Date().toISOString(),
    userInput: userInput,
    responseA: result.standard,
    responseB: result.designed.response,
    designIntent: result.designed.judgment.intent,
    designStrategy: result.designed.judgment.strategy,
    vote: null,
  };
  const scores = await judgePromise;
  if (scores) { logEntry.scoresA = scores.a; logEntry.scoresB = scores.b; }
  sessionLog.push(logEntry);
  render();
}

function tryContinueChat(userInput) {
  const pair = latestUnvotedPair();
  if (pair) {
    // Save draft — will be auto-sent after voting
    pendingDraft = userInput;
    document.querySelectorAll('.response-card[data-idx="' + pair.idx + '"]').forEach(c => {
      c.style.transition = 'none';
      c.style.boxShadow = '0 0 0 5px rgba(224,123,60,0.6), 0 8px 24px rgba(224,123,60,0.3)';
      c.style.borderColor = '#e07b3c';
      setTimeout(() => {
        c.style.transition = 'box-shadow 0.6s, border-color 0.6s';
        c.style.boxShadow = '';
        c.style.borderColor = '';
      }, 120);
    });
    const firstCard = document.querySelector('.response-card[data-idx="' + pair.idx + '"]');
    if (firstCard) firstCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    buildToast('先选一个让你更舒服的回复吧～', 'warn');
    setTimeout(() => {
      const inp = document.getElementById('chatInput');
      if (inp) { inp.focus(); inp.value = pendingDraft; }
    }, 2200);
    return;
  }
  continueChat(userInput);
}

function latestUnvotedPair() {
  const msgs = standardMessages.filter(m => m._pairIndex !== undefined && m._pairData && !m._pairData.vote);
  if (!msgs.length) return null;
  return msgs[msgs.length - 1]._pairData;
}

function buildToast(msg, type) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  if (type === 'warn') t.classList.add('warn');
  setTimeout(() => { t.classList.remove('show', 'warn'); }, 2500);
}

async function continueChat(userInput) {
  round++;
  standardMessages.push({ role: 'user', content: userInput });
  designedMessages.push({ role: 'user', content: userInput });
  render();
  document.getElementById('loadingArea').innerHTML = '<div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>';

  const result = await callAPI();
  if (!result || result.error) { showError(result?.error); return; }

  const judgePromise = callJudge(userInput, result.standard, result.designed.response);

  standardMessages.push({ role: 'assistant', content: result.standard, _pairIndex: round - 1, _pairData: { idx: round - 1, standard: result.standard, designedResponse: result.designed.response, judgment: result.designed.judgment } });
  designedMessages.push({ role: 'assistant', content: result.designed.response });
  const logEntry = {
    round: round,
    time: new Date().toISOString(),
    userInput: userInput,
    responseA: result.standard,
    responseB: result.designed.response,
    designIntent: result.designed.judgment.intent,
    designStrategy: result.designed.judgment.strategy,
    vote: null,
  };
  const scores = await judgePromise;
  if (scores) { logEntry.scoresA = scores.a; logEntry.scoresB = scores.b; }
  sessionLog.push(logEntry);
  render();
}

async function callJudge(userInput, responseA, responseB) {
  const key = userKey;
  if (!key) return null;
  try {
    const judgePrompt = JUDGE_SYSTEM
      .replace('{USER_INPUT}', userInput.substring(0, 500))
      .replace('{RESPONSE_A}', responseA.substring(0, 1000))
      .replace('{RESPONSE_B}', responseB.substring(0, 1000));
    const res = await fetch(DEEPSEEK_API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
      body: JSON.stringify({ model: 'deepseek-chat', messages: [{ role: 'system', content: judgePrompt }], temperature: 0, max_tokens: 300 }),
      signal: AbortSignal.timeout(15000),
    });
    const data = await res.json();
    if (!res.ok) return null;
    const raw = data.choices?.[0]?.message?.content || '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (!jsonMatch) return null;
    return JSON.parse(jsonMatch[0]);
  } catch (e) {
    console.warn('Judge scoring failed:', e);
    return null;
  }
}

async function callAPI() {
  const key = userKey;
  if (!key) { openKeyModal(); return null; }
  try {
    const [standardRes, designedRes] = await Promise.all([
      fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: standardMessages, temperature: 0.7, max_tokens: 600 }),
        signal: AbortSignal.timeout(25000),
      }),
      fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: designedMessages, temperature: 0.7, max_tokens: 600 }),
        signal: AbortSignal.timeout(25000),
      }),
    ]);
    const [sData, dData] = await Promise.all([standardRes.json(), designedRes.json()]);
    if (!standardRes.ok || !designedRes.ok) {
      const errData = !standardRes.ok ? sData : dData;
      const status = !standardRes.ok ? standardRes.status : designedRes.status;
      if (status === 401) {
        // Key无效，清除并提示
        sessionStorage.removeItem('ds_key'); userKey = '';
        openKeyModal();
        return null;
      }
      throw new Error(errData.error?.message || 'API error');
    }
    const standard = sData.choices?.[0]?.message?.content || '';
    const raw = dData.choices?.[0]?.message?.content || '';
    // 新格式：回复正文最后有 "意图：xxx" 和 "策略：xxx" 各一行
    // 同时兼容旧版【意图】【策略】【回应】格式
    let response = raw;
    let intent = '未判断';
    let strategy = '未说明';

    // 先试新版格式：行末的 "意图：xxx" 和 "策略：xxx"
    const intentLine = raw.match(/\n意图[:：]\s*(.+?)(?:\n|$)/);
    const strategyLine = raw.match(/\n策略[:：]\s*(.+?)(?:\n|$)/);
    if (intentLine && strategyLine) {
      // 新版格式匹配成功：去掉最后两行判断标记
      const lines = raw.split('\n');
      // 从末尾找"意图："和"策略："所在的行，去掉它们
      while (lines.length && (lines[lines.length-1].trim().startsWith('策略') || lines[lines.length-1].trim().startsWith('意图'))) {
        lines.pop();
      }
      response = lines.join('\n').trim();
      intent = intentLine[1].trim();
      strategy = strategyLine[1].trim();
    } else {
      // 兼容旧版【意图】【策略】【回应】格式
      const oldIntent = raw.match(/【意图[:：\s]*([\s\S]+?)】(?=\s*【策略|【回应|$)/);
      const oldStrategy = raw.match(/【策略[:：\s]*([\s\S]+?)】(?=\s*【回应|$)/);
      const oldResp = raw.match(/【回应[:：\s]*([\s\S]+)$/);
      if (oldResp) {
        response = oldResp[1].trim();
        intent = oldIntent?.[1]?.trim() || '未判断';
        strategy = oldStrategy?.[1]?.trim() || '未说明';
      } else if (oldIntent || oldStrategy) {
        response = raw.replace(/【意图[:：\s]*[\s\S]*?】(?=\s*【策略|【回应|$)/g,'')
                     .replace(/【策略[:：\s]*[\s\S]*?】(?=\s*【回应|$)/g,'')
                     .replace(/【回应[:：\s]*/g,'').trim();
        intent = oldIntent?.[1]?.trim() || '未判断';
        strategy = oldStrategy?.[1]?.trim() || '未说明';
      }
    }
    // 安全阀：回应太短或太长说明解析失败
    if (response.length < 8) { response = raw; intent = '未判断'; strategy = '未说明'; }
    if (intent.length > 80) intent = intent.substring(0, 77) + '...';
    if (strategy.length > 80) strategy = strategy.substring(0, 77) + '...';
    return {
      standard,
      designed: {
        judgment: { intent: intent, strategy: strategy },
        response,
      }
    };
  } catch (e) {
    console.error('API error:', e);
    return { error: e.message || '未知错误' };
  }
}

function getPairData(idx) {
  const msgs = standardMessages.filter(m => m._pairIndex === idx);
  if (!msgs.length) return null;
  return msgs[0]._pairData;
}

function recordVote(idx, choice) {
  const pair = getPairData(idx);
  if (!pair || pair.vote) return;
  pair.vote = choice;
  votes[choice]++;
  const entry = sessionLog.find(e => e.round === idx + 1);
  if (entry) entry.vote = choice === 'standard' ? 'A' : 'B';
  const draft = pendingDraft || document.getElementById('chatInput')?.value || '';
  pendingDraft = '';
  render();
  // If user had typed something before voting, auto-send it now
  if (draft.trim()) {
    buildToast('你的消息正在发送…', 'warn');
    setTimeout(() => continueChat(draft.trim()), 300);
  } else {
    setTimeout(() => {
      const input = document.getElementById('chatInput');
      if (input) {
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
        input.focus();
        input.style.boxShadow = '0 0 0 3px rgba(201,112,78,0.25)';
        setTimeout(() => { input.style.boxShadow = ''; }, 1500);
      }
    }, 50);
  }
}

// ── Reset ──
function resetState() {
  state = 'pickPersonality';
  round = 0;
  personality = null;
  personalityName = '';
  standardMessages = [{ role: 'system', content: STANDARD_SYSTEM }];
  designedMessages = [{ role: 'system', content: '' }]; // will be set in startChat
  votes = { standard: 0, designed: 0 };
  currentMood = '';
  sessionLog = [];
  sessionStart = '';
}

// ── Session persistence ──
function saveSessionToStorage() {
  try {
    const sessions = JSON.parse(localStorage.getItem('demo_sessions') || '[]');
    sessions.push({
      id: sessionStart,
      time: new Date().toISOString(),
      personality: personalityName,
      rounds: sessionLog.length,
      votesA: votes.standard,
      votesB: votes.designed,
      mood: currentMood,
      feedback: document.getElementById('feedbackText')?.value || '',
      log: sessionLog,
    });
    // Keep last 50 sessions
    while (sessions.length > 50) sessions.shift();
    localStorage.setItem('demo_sessions', JSON.stringify(sessions));
  } catch(e) { console.warn('save failed', e); }
}

function renderAdmin() {
  let sessions = [];
  try { sessions = JSON.parse(localStorage.getItem('demo_sessions') || '[]'); } catch(e) {}
  if (!sessions.length) return '<div class="welcome-wrap"><div class="welcome-greeting">还没有数据。</div><div class="welcome-sub">有人聊完天后这里会自动出现。</div></div>';

  let html = '<div style="max-width:800px;margin:0 auto;padding:40px 20px;">';
  html += '<h2 style="font-size:20px;margin-bottom:8px;">对话数据后台</h2>';
  html += '<p style="color:var(--muted);font-size:13px;margin-bottom:24px;">共 ' + sessions.length + ' 次会话。数据存在本浏览器localStorage中。</p>';
  html += '<button onclick="exportAllSessions()" style="padding:10px 24px;border:1px solid var(--accent);border-radius:20px;background:transparent;color:var(--accent);font-size:14px;cursor:pointer;margin-bottom:24px;font-family:inherit;">导出全部 (CSV)</button>';

  // Show sessions in reverse chronological order
  for (let s = sessions.length - 1; s >= 0; s--) {
    const sess = sessions[s];
    html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;margin-bottom:12px;">';
    html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">';
    html += '<strong>' + (sess.personality || '未知人格') + '</strong>';
    html += '<span style="font-size:12px;color:var(--light);">' + (sess.time || '').substring(0,16) + '</span>';
    html += '</div>';
    html += '<div style="font-size:13px;color:var(--muted);">' + sess.rounds + ' 轮 · 选A ' + sess.votesA + '次 · 选B ' + sess.votesB + '次 · 感受: ' + (sess.mood || '未选') + '</div>';
    if (sess.feedback) html += '<div style="font-size:12px;color:var(--light);margin-top:4px;">' + escapeHtml(sess.feedback.substring(0,120)) + '</div>';
    html += '<button onclick="downloadSession(\'' + sess.id + '\')" style="margin-top:8px;background:none;border:none;color:var(--accent);font-size:12px;cursor:pointer;">下载此会话 CSV</button>';
    html += '</div>';
  }
  html += '<div style="text-align:center;margin-top:32px;"><a href="' + window.location.pathname + '" style="color:var(--accent);font-size:13px;">← 回到Demo</a></div>';
  html += '</div>';
  return html;
}

function exportAllSessions() {
  try {
    const sessions = JSON.parse(localStorage.getItem('demo_sessions') || '[]');
    if (!sessions.length) return;
    let allRows = [['会话ID','时间','人格','轮次','选A','选B','结束感受','文字反馈']];
    sessions.forEach(s => {
      allRows.push([s.id, s.time, s.personality, s.rounds, s.votesA, s.votesB, s.mood||'', csvEscape(s.feedback||'')]);
      if (s.log) {
        allRows.push(['轮次','用户输入','回应A','回应B','设计意图','设计策略','用户选择']);
        s.log.forEach(e => {
          allRows.push([e.round, csvEscape(e.userInput), csvEscape(e.responseA), csvEscape(e.responseB), e.designIntent, e.designStrategy, e.vote||'']);
        });
        allRows.push(['']);
      }
    });
    const csv = allRows.map(r => r.join(',')).join('\n');
    downloadBlob(csv, 'all-sessions-' + new Date().toISOString().slice(0,10) + '.csv');
  } catch(e) { alert('导出失败: ' + e.message); }
}

function downloadSession(sessionId) {
  try {
    const sessions = JSON.parse(localStorage.getItem('demo_sessions') || '[]');
    const s = sessions.find(x => x.id === sessionId);
    if (!s || !s.log) return;
    const rows = [['会话ID',s.id],['人格',s.personality],['时间',s.time],['选A',s.votesA],['选B',s.votesB],['感受',s.mood||''],['反馈',s.feedback||''],[''],['轮次','用户输入','回应A','回应B','设计意图','设计策略','用户选择']];
    s.log.forEach(e => {
      rows.push([e.round, csvEscape(e.userInput), csvEscape(e.responseA), csvEscape(e.responseB), e.designIntent, e.designStrategy, e.vote||'']);
    });
    downloadBlob(rows.map(r => r.join(',')).join('\n'), 'session-' + sessionId.substring(0,19) + '.csv');
  } catch(e) { alert('导出失败: ' + e.message); }
}

function downloadBlob(csv, filename) {
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

function copySessionToClipboard() {
  const text = [
    '【AI对话Demo反馈】',
    '人格：' + personalityName,
    '时间：' + (sessionStart ? sessionStart.substring(0,16) : ''),
    '轮次：' + sessionLog.length,
    '选左边的普通AI：' + votes.standard + ' 次',
    '选右边的人格：' + votes.designed + ' 次',
    '结束感受：' + (currentMood === 'calm' ? '平静了些' : currentMood === 'same' ? '差不多' : currentMood === 'alone' ? '更想一个人待着' : '未选'),
    '文字反馈：' + (document.getElementById('feedbackText')?.value || '无'),
    '',
  ].join('\n');
  navigator.clipboard.writeText(text).then(() => {
    buildToast('已复制，去微信粘贴发送吧～');
  }).catch(() => {
    alert('复制失败，请截图发给我吧～');
  });
}

function exportData() {
  if (!sessionLog.length) return;
  const hasScores = sessionLog.some(e => e.scoresA || e.scoresB);
  const rows = [
    ['会话开始', sessionStart],
    ['人格选择', personalityName],
    ['总轮次', sessionLog.length],
    ['选A次数', votes.standard],
    ['选B次数', votes.designed],
    ['结束感受', currentMood || '未选'],
    ['文字反馈', document.getElementById('feedbackText')?.value || ''],
    [''],
  ];
  if (hasScores) {
    rows[rows.length - 1] = ['', '', '', '--- 五维评分 ---', '', '', '', ''];
    rows.push(['', '', '回复A-情绪跟随', '回复A-意图对齐', '回复A-表达真实度', '回复A-对话节奏', '回复A-人格稳定性', '', '']);
    rows.push(['', '', '回复B-情绪跟随', '回复B-意图对齐', '回复B-表达真实度', '回复B-对话节奏', '回复B-人格稳定性', '', '']);
    rows.push(['']);
  }
  rows.push(['轮次', '时间', '用户输入', '回应A', '回应B', '设计意图', '设计策略', '用户选择']);
  sessionLog.forEach(e => {
    const sa = e.scoresA || {};
    const sb = e.scoresB || {};
    rows.push([
      e.round, e.time, csvEscape(e.userInput), csvEscape(e.responseA),
      csvEscape(e.responseB), e.designIntent, e.designStrategy, e.vote || '未投'
    ]);
    if (hasScores) {
      rows.push(['', '', '', '情绪跟随:' + (sa['情绪跟随'] || '-'), '意图对齐:' + (sa['意图对齐'] || '-'), '表达真实度:' + (sa['表达真实度'] || '-'), '对话节奏:' + (sa['对话节奏'] || '-'), '人格稳定性:' + (sa['人格稳定性'] || '-')]);
      rows.push(['', '', '', '情绪跟随:' + (sb['情绪跟随'] || '-'), '意图对齐:' + (sb['意图对齐'] || '-'), '表达真实度:' + (sb['表达真实度'] || '-'), '对话节奏:' + (sb['对话节奏'] || '-'), '人格稳定性:' + (sb['人格稳定性'] || '-')]);
    }
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai-dialogue-data-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(s) {
  if (!s) return '';
  return '"' + s.replace(/"/g, '""').replace(/\n/g, ' ') + '"';
}

function stripMarkdown(s) {
  // 去掉**粗体** *斜体* `代码` 等markdown标记，保留文字
  return s
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/^[#]{1,6}\s+/gm, '')
    .replace(/^[-*]\s+/gm, '• ');
}

function showError(msg) {
  const area = document.getElementById('loadingArea');
  if (!area) return;
  const errMsg = msg || '未知网络错误';
  area.innerHTML = '<div style="text-align:center;padding:16px;border:1px solid #e0d4cf;border-radius:8px;background:#fdfaf8;"><p style="color:var(--muted);font-size:13px;margin-bottom:4px;">出了点问题</p><p style="color:var(--light);font-size:11px;">' + escapeHtml(errMsg) + '</p><p style="color:var(--light);font-size:11px;">刷新页面试试，或者换一个预设句子</p></div>';
}

// ── Key management ──
function openKeyModal() {
  document.getElementById('keyModal').classList.add('show');
  document.getElementById('keyInput').focus();
}
function saveKey() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val) return;
  userKey = val;
  sessionStorage.setItem('ds_key', val);
  document.getElementById('keyModal').classList.remove('show');
  render();
}

// ── Utils ──
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
render();
</script>
