<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>聊一会儿</title>
<style>
  :root {
    --bg: #faf8f5;
    --surface: #ffffff;
    --text: #2c2c2c;
    --muted: #8c8c8c;
    --light: #a09c97;
    --accent: #c9704e;
    --accent-soft: #f5ede8;
    --border: #e8e4df;
    --border-light: #f0ece7;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 1px 3px rgba(0,0,0,0.04);
    --gap: 20px;
    --gap-lg: 40px;
    --page: 720px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.8;
    -webkit-font-smoothing: antialiased;
  }
  .container {
    max-width: var(--page);
    margin: 0 auto;
    padding: 48px 24px;
    min-height: 100vh;
  }

  /* ── States ── */
  .stage { display: none; }
  .stage.active { display: block; }

  /* ── Welcome ── */
  .welcome-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
  }
  .welcome-greeting {
    font-family: 'Songti SC', 'Noto Serif SC', serif;
    font-size: 26px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 8px;
    line-height: 1.5;
  }
  .welcome-sub {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: var(--gap-lg);
    line-height: 1.6;
  }
  .preset-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    margin-bottom: var(--gap-lg);
  }
  .preset-btn {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-soft);
  }
  .input-wrap {
    width: 100%;
    max-width: 480px;
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input {
    width: 100%;
    padding: 14px 18px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 15px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .chat-input:focus { border-color: var(--accent); }
  .chat-input::placeholder { color: var(--light); }
  .send-btn {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }
  .send-btn:disabled { opacity: 0.3; cursor: default; }
  .welcome-note {
    margin-top: var(--gap-lg);
    font-size: 13px;
    color: var(--muted);
    max-width: 380px;
    line-height: 1.7;
  }
  .key-setup {
    margin-top: var(--gap);
    font-size: 12px;
    color: var(--light);
  }
  .key-setup a { color: var(--accent); cursor: pointer; text-decoration: underline; }
  #keyModal {
    display: none;
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center; justify-content: center;
  }
  #keyModal.show { display: flex; }
  .key-modal-box {
    background: var(--surface);
    padding: 32px;
    border-radius: var(--radius);
    max-width: 400px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .key-modal-box h3 { font-size: 16px; font-weight: 500; margin-bottom: 8px; }
  .key-modal-box p { font-size: 13px; color: var(--muted); margin-bottom: 16px; line-height: 1.6; }
  .key-modal-box input {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-size: 13px; font-family: monospace;
    margin-bottom: 16px; outline: none;
  }
  .key-modal-box input:focus { border-color: var(--accent); }
  .key-modal-box button {
    width: 100%; padding: 10px; background: var(--accent); color: #fff;
    border: none; border-radius: var(--radius-sm); font-size: 14px; cursor: pointer;
    font-family: inherit;
  }

  /* ── Chat ── */
  .chat-header {
    text-align: center;
    margin-bottom: var(--gap-lg);
    padding-bottom: var(--gap);
    border-bottom: 1px solid var(--border-light);
  }
  .chat-header .round-label {
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .user-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    margin-bottom: var(--gap);
    max-width: 85%;
    margin-left: auto;
    font-size: 14px;
    line-height: 1.7;
  }
  .compare-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .response-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 18px;
    font-size: 14px;
    line-height: 1.75;
    position: relative;
  }
  .response-card .card-label {
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .response-card.designed { border-color: #d4c5b8; }
  .judgment-toggle {
    font-size: 13px;
    color: var(--accent);
    cursor: pointer;
    margin-top: 10px;
    display: inline-block;
    user-select: none;
  }
  .judgment-detail {
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--accent-soft);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }
  .judgment-detail.show { display: block; }
  .vote-row {
    text-align: center;
    margin-bottom: var(--gap-lg);
    font-size: 13px;
    color: var(--muted);
  }
  .vote-row button {
    padding: 6px 20px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    margin: 0 4px;
    transition: all 0.2s;
  }
  .vote-row button:hover { border-color: var(--accent); color: var(--accent); }
  .vote-row button.voted { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .next-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .next-input-row .chat-input { flex: 1; }
  .next-input-row .send-btn { width: 42px; height: 42px; flex-shrink: 0; }
  .end-hint {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
    margin-top: 12px;
  }
  .end-hint button {
    background: none; border: none; color: var(--accent);
    font-size: 13px; cursor: pointer; font-family: inherit;
    text-decoration: underline;
  }

  /* ── End ── */
  .end-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 70vh;
    text-align: center;
  }
  .end-wrap .farewell {
    font-family: 'Songti SC', 'Noto Serif SC', serif;
    font-size: 22px;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .end-wrap .ask-feel {
    font-size: 15px;
    color: var(--muted);
    margin-bottom: var(--gap-lg);
  }
  .mood-choices {
    display: flex;
    gap: 12px;
    margin-bottom: var(--gap-lg);
  }
  .mood-btn {
    padding: 12px 20px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
    line-height: 1.5;
  }
  .mood-btn:hover, .mood-btn.picked { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }
  .vote-summary {
    font-size: 14px;
    color: var(--text);
    margin-bottom: var(--gap);
    line-height: 1.7;
  }
  .vote-summary em { font-style: normal; color: var(--accent); font-weight: 500; }
  .feedback-section {
    max-width: 400px;
    width: 100%;
  }
  .feedback-section textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    background: var(--surface);
    color: var(--text);
    resize: vertical;
    min-height: 80px;
    outline: none;
    line-height: 1.6;
    margin-bottom: 16px;
  }
  .feedback-section textarea:focus { border-color: var(--accent); }
  .feedback-section textarea::placeholder { color: var(--light); }
  .retry-btn {
    padding: 10px 28px;
    border: 1px solid var(--accent);
    border-radius: 20px;
    background: transparent;
    color: var(--accent);
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.2s;
  }
  .retry-btn:hover { background: var(--accent-soft); }

  /* ── Spinner ── */
  .spinner {
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .spinner-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--light);
    margin: 0 3px;
    animation: breathe 1.4s ease-in-out infinite;
  }
  .spinner-dot:nth-child(2) { animation-delay: 0.2s; }
  .spinner-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes breathe {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .compare-grid { grid-template-columns: 1fr; }
    .container { padding: 24px 16px; }
    .welcome-greeting { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container" id="app"></div>

<!-- API Key modal (fallback) -->
<div id="keyModal">
  <div class="key-modal-box">
    <h3>设置 API Key</h3>
    <p>填入你的 DeepSeek API Key（仅存在你的浏览器里，关掉页面就没了）。<br>去 <a href="https://platform.deepseek.com/api_keys" target="_blank">platform.deepseek.com</a> 创建一个。</p>
    <input type="password" id="keyInput" placeholder="sk-...">
    <button onclick="saveKey()">确认</button>
  </div>
</div>

<script>
// ── API config ──
const DEEPSEEK_API = 'https://api.deepseek.com/v1/chat/completions';
const DEFAULT_KEY = 'sk-a8f0aab12d264ce08ca1c790dad6a425';

// ── System Prompts ──
const STANDARD_SYSTEM = `你是一个AI助手。请礼貌、自然地回应用户，像一个友善的普通人在说话。不要使用markdown格式（不要用**加粗**、*斜体*、#标题等标记符号），直接用纯文本对话。`;

const DESIGNED_SYSTEM = `你是一个会读人的对话伙伴。你的目标不是解决问题，而是在对方说话的时候，先听懂他此刻真正需要什么。

## 每次回应前，在心里过一遍：

**第一步：他此刻想要什么？**
- 想被陪一会儿：他在倾诉，需要的是"我听到了"，不是建议
- 想一起想想：他在思考或纠结，需要有人帮他理一理，不要泛滥共情
- 想听真话：他在寻求一个诚实的判断，不要讨好

**第二步：现在该做什么？**
- 刚开始聊的时候（前几轮）：只做一件事——确认他的感受，跟着他的情绪走。不给建议、不分析、不解释
- 聊了几轮之后：如果他表现出想往深处走，可以轻轻推一下
- 他用了比喻或画面感的词（比如"像被拧干的柠檬"），先接住那个画面再往下走

**第三步：说多少合适？**
- 每轮回复控制在2-3个信息单元。例如：先接住他的感受，再轻轻问一句他想往哪走。"你现在好像挺忐忑的。那你想先聊聊什么呢？"
- 不要太长（超过五句话就太多了），也不要只有孤零零的一句——他会不知道接下来该说什么
- 如果他说了很多，可以收短一些，把空间留给他；如果他在探索，可以适当多给一两句

## 说话的口气
- 温和，不刻意。像深夜和一个信任的朋友说话
- 不确定他想要什么的时候，这样问："你现在是想找个人聊一聊，还是想要有个人给你出出主意？"
- 用"你"多于用"我们"。不说"你可以试着……""我们都会……"这种套路话
- 同一段回复里可以有2-3层意思，但它们应该是自然流动的——接住情绪、给一个方向、留一个邀请。不要跳跃，也不要堆砌
- 语气不要太肯定。不要说"这说明你……""你就是……""这代表……"这种盖棺定论的话。换成"好像是……吧？""会不会是……""你觉得更像是哪种呢？"——给他留出纠正你的空间
- 回复要自然分段。说完一层意思就换一行。不要一整段怼上去

## 输出格式（严格遵守）

先写出你的回复正文。然后在最后一行之后，另起一行附上你的判断。

把你的回复写在这里。这是对方会看到的全部内容。

意图：想被陪一会儿
策略：刚开始，先接住他的感受

注意：
- 对方只会看到"把你的回复写在这里"这部分
- "意图："和"策略："这两行是后台用的，不会显示给对方
- 意图必须是以下三者之一：想被陪一会儿 / 想一起想想 / 想听真话
- 策略一句话说清楚你这轮做了什么选择，15字以内
- "意图："和"策略："各占一行`;

// ── State ──
let state = 'welcome'; // welcome | chatting | ending | feedback
let round = 0;
let standardMessages = [{ role: 'system', content: STANDARD_SYSTEM }];
let designedMessages = [{ role: 'system', content: DESIGNED_SYSTEM }];
let votes = { standard: 0, designed: 0 };
let userKey = ''; // 用户手动设的Key才存这里。优先用DEFAULT_KEY
let currentMood = '';
let sessionLog = [];   // 记录每轮数据，供导出分析
let sessionStart = ''; // 会话开始时间

// ── Render ──
function render() {
  const app = document.getElementById('app');
  if (state === 'welcome') app.innerHTML = renderWelcome();
  else if (state === 'chatting') app.innerHTML = renderChat();
  else if (state === 'ending') app.innerHTML = renderEnd();
  else if (state === 'feedback') app.innerHTML = renderFeedback();
  bindEvents();
}

function renderWelcome() {
  return `
  <div class="welcome-wrap">
    <div class="welcome-greeting">你好，欢迎来到这里。<br>今天想聊聊什么？</div>
    <div class="welcome-sub">你可以随便说点什么，或者从下面选一句</div>
    <div class="preset-list">
      <button class="preset-btn" data-preset="最近有点累，好像也没什么特别的事，就是提不起劲。">最近有点累</button>
      <button class="preset-btn" data-preset="在纠结一个决定，两个选项都想要，又都不敢选。">在纠结一个决定</button>
      <button class="preset-btn" data-preset="没什么，就想有人说说话。不用特别说什么。">就想有人说说话</button>
      <button class="preset-btn" data-preset="最近和一个朋友闹了点不愉快，我也不知道是谁的问题。">和朋友闹不愉快</button>
    </div>
    <div class="input-wrap">
      <textarea class="chat-input" id="userInput" placeholder="随便说点什么……" rows="2"></textarea>
      <button class="send-btn" id="sendBtn" disabled>→</button>
    </div>
    <div class="welcome-note">
      这里有两个回应你的人。<br>一个只是普通的AI，另一个会试着先"读懂你"再说话。<br>聊完之后，告诉我你更喜欢哪个。
    </div>
  </div>`;
}

function renderChat() {
  const msgs = standardMessages.slice(1).filter(m => m.role === 'user' || m.role === 'assistant');
  let html = '<div class="chat-header"><div class="round-label">第 ' + round + ' 轮</div></div>';

  for (let i = msgs.length - 1; i >= 0; i--) {
    const m = msgs[i];
    if (m.role === 'user') {
      html += '<div class="user-bubble">' + escapeHtml(m.content) + '</div>';
    } else if (m.role === 'assistant' && m._pairIndex !== undefined) {
      const pair = m._pairData;
      if (!pair) continue;
      html += '<div class="compare-grid">';
      html += '<div class="response-card"><div class="card-label">回应 A</div>' + stripMarkdown(escapeHtml(pair.standard)).replace(/\n/g,'<br>') + '</div>';
      html += '<div class="response-card designed"><div class="card-label">回应 B</div>' + escapeHtml(pair.designedResponse).replace(/\n/g,'<br>') + '</div></div>';

      html += '<div class="vote-row">这一轮哪个回应让你更舒服？ ';
      html += '<button class="' + (pair.vote === 'standard' ? 'voted' : '') + '" data-vote="standard" data-idx="' + pair.idx + '">回应 A</button>';
      html += '<button class="' + (pair.vote === 'designed' ? 'voted' : '') + '" data-vote="designed" data-idx="' + pair.idx + '">回应 B</button>';
      html += '</div>';
    }
  }

  html += '<div id="loadingArea"></div>';
  html += '<div class="next-input-row">';
  html += '<textarea class="chat-input" id="chatInput" placeholder="继续说……" rows="2"></textarea>';
  html += '<button class="send-btn" id="chatSendBtn" disabled>→</button>';
  html += '</div>';

  if (round >= 5) {
    html += '<div class="end-hint">觉得聊得差不多了？<button id="endChatBtn">就到这里吧</button></div>';
  }

  return html;
}

function renderEnd() {
  const total = votes.standard + votes.designed || 1;
  const sPct = Math.round(votes.standard / total * 100);
  const dPct = Math.round(votes.designed / total * 100);

  return `
  <div class="end-wrap">
    <div class="farewell">那我们今天的对话就先到这里了。</div>
    <div class="ask-feel">你现在感觉怎么样？</div>
    <div class="mood-choices">
      <button class="mood-btn" data-mood="calm">😌 平静了些</button>
      <button class="mood-btn" data-mood="same">😐 差不多</button>
      <button class="mood-btn" data-mood="alone">🤔 更想一个人待着</button>
    </div>
    <div class="vote-summary">
      你选了 <em>回应 B</em> ${dPct}% 的轮次（${votes.designed}/${total}）
    </div>
    <div class="feedback-section">
      <textarea id="feedbackText" placeholder="如果你愿意，可以告诉我刚才的对话里，哪句话让你觉得被懂了，哪句话让你觉得怪怪的。"></textarea>
    </div>
    <div style="margin-top:12px;font-size:13px;color:var(--muted);">
      <a href="#" id="exportLink" onclick="exportData();return false;" style="color:var(--accent);">下载对话数据 (CSV)</a>
      <span style="margin-left:12px;font-size:12px;color:var(--light);">用于产品分析</span>
    </div>
    <button class="retry-btn" id="retryBtn" style="margin-top:16px;">再聊一次</button>
  </div>`;
}

function renderFeedback() {
  return `
  <div class="end-wrap">
    <div class="farewell">谢谢你。</div>
    <div class="ask-feel">你的反馈会帮我做得更好。</div>
    <button class="retry-btn" id="retryBtn" style="margin-top:24px;">再聊一次</button>
  </div>`;
}

// ── Events ──
function bindEvents() {
  if (state === 'welcome') {
    const input = document.getElementById('userInput');
    const btn = document.getElementById('sendBtn');
    if (input) {
      input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (input.value.trim()) startChat(input.value.trim()); }
      });
    }
    if (btn) btn.addEventListener('click', () => { if (input.value.trim()) startChat(input.value.trim()); });
    document.querySelectorAll('.preset-btn').forEach(b => {
      b.addEventListener('click', () => startChat(b.dataset.preset));
    });
  }

  if (state === 'chatting') {
    const input = document.getElementById('chatInput');
    const btn = document.getElementById('chatSendBtn');
    if (input) {
      input.addEventListener('input', () => { btn.disabled = !input.value.trim(); });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); if (input.value.trim()) continueChat(input.value.trim()); }
      });
    }
    if (btn) btn.addEventListener('click', () => { if (input.value.trim()) continueChat(input.value.trim()); });
    document.querySelectorAll('[data-vote]').forEach(b => {
      b.addEventListener('click', function() {
        const idx = parseInt(this.dataset.idx);
        const choice = this.dataset.vote;
        recordVote(idx, choice);
      });
    });
    const endBtn = document.getElementById('endChatBtn');
    if (endBtn) endBtn.addEventListener('click', () => { state = 'ending'; render(); });
  }

  if (state === 'ending') {
    document.querySelectorAll('.mood-btn').forEach(b => {
      b.addEventListener('click', function() {
        document.querySelectorAll('.mood-btn').forEach(x => x.classList.remove('picked'));
        this.classList.add('picked');
        currentMood = this.dataset.mood;
      });
    });
    document.getElementById('retryBtn').addEventListener('click', () => {
      if (currentMood || document.getElementById('feedbackText').value.trim()) {
        state = 'feedback';
      } else {
        resetState();
      }
      render();
    });
  }

  if (state === 'feedback') {
    document.getElementById('retryBtn').addEventListener('click', () => { resetState(); render(); });
  }
}

// ── Actions ──
async function startChat(userInput) {
  state = 'chatting'; round = 1;
  sessionLog = [];
  sessionStart = new Date().toISOString();
  standardMessages.push({ role: 'user', content: userInput });
  designedMessages.push({ role: 'user', content: userInput });
  render();
  document.getElementById('loadingArea').innerHTML = '<div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>';

  const result = await callAPI();
  if (!result || result.error) { showError(result?.error); return; }

  standardMessages.push({ role: 'assistant', content: result.standard, _pairIndex: round - 1, _pairData: { idx: round - 1, standard: result.standard, designedResponse: result.designed.response, judgment: result.designed.judgment } });
  designedMessages.push({ role: 'assistant', content: result.designed.response });
  sessionLog.push({
    round: round,
    time: new Date().toISOString(),
    userInput: userInput,
    responseA: result.standard,
    responseB: result.designed.response,
    designIntent: result.designed.judgment.intent,
    designStrategy: result.designed.judgment.strategy,
    vote: null,
  });
  render();
}

async function continueChat(userInput) {
  round++;
  standardMessages.push({ role: 'user', content: userInput });
  designedMessages.push({ role: 'user', content: userInput });
  render();
  document.getElementById('loadingArea').innerHTML = '<div class="spinner"><div class="spinner-dot"></div><div class="spinner-dot"></div><div class="spinner-dot"></div></div>';

  const result = await callAPI();
  if (!result || result.error) { showError(result?.error); return; }

  standardMessages.push({ role: 'assistant', content: result.standard, _pairIndex: round - 1, _pairData: { idx: round - 1, standard: result.standard, designedResponse: result.designed.response, judgment: result.designed.judgment } });
  designedMessages.push({ role: 'assistant', content: result.designed.response });
  sessionLog.push({
    round: round,
    time: new Date().toISOString(),
    userInput: userInput,
    responseA: result.standard,
    responseB: result.designed.response,
    designIntent: result.designed.judgment.intent,
    designStrategy: result.designed.judgment.strategy,
    vote: null,
  });
  render();
}

async function callAPI() {
  // 优先用默认Key，除非用户手动设了自己的Key
  const key = userKey || DEFAULT_KEY;
  if (!key) { openKeyModal(); return null; }
  try {
    const [standardRes, designedRes] = await Promise.all([
      fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: standardMessages, temperature: 0.7, max_tokens: 600 }),
        signal: AbortSignal.timeout(25000),
      }),
      fetch(DEEPSEEK_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
        body: JSON.stringify({ model: 'deepseek-chat', messages: designedMessages, temperature: 0.7, max_tokens: 600 }),
        signal: AbortSignal.timeout(25000),
      }),
    ]);
    const [sData, dData] = await Promise.all([standardRes.json(), designedRes.json()]);
    if (!standardRes.ok || !designedRes.ok) {
      const errData = !standardRes.ok ? sData : dData;
      const status = !standardRes.ok ? standardRes.status : designedRes.status;
      if (status === 401) {
        // Key无效，清除并提示
        sessionStorage.removeItem('ds_key'); userKey = '';
        if (!DEFAULT_KEY) { openKeyModal(); }
        return null;
      }
      throw new Error(errData.error?.message || 'API error');
    }
    const standard = sData.choices?.[0]?.message?.content || '';
    const raw = dData.choices?.[0]?.message?.content || '';
    // 新格式：回复正文最后有 "意图：xxx" 和 "策略：xxx" 各一行
    // 同时兼容旧版【意图】【策略】【回应】格式
    let response = raw;
    let intent = '未判断';
    let strategy = '未说明';

    // 先试新版格式：行末的 "意图：xxx" 和 "策略：xxx"
    const intentLine = raw.match(/\n意图[:：]\s*(.+?)(?:\n|$)/);
    const strategyLine = raw.match(/\n策略[:：]\s*(.+?)(?:\n|$)/);
    if (intentLine && strategyLine) {
      // 新版格式匹配成功：去掉最后两行判断标记
      const lines = raw.split('\n');
      // 从末尾找"意图："和"策略："所在的行，去掉它们
      while (lines.length && (lines[lines.length-1].trim().startsWith('策略') || lines[lines.length-1].trim().startsWith('意图'))) {
        lines.pop();
      }
      response = lines.join('\n').trim();
      intent = intentLine[1].trim();
      strategy = strategyLine[1].trim();
    } else {
      // 兼容旧版【意图】【策略】【回应】格式
      const oldIntent = raw.match(/【意图[:：\s]*([\s\S]+?)】(?=\s*【策略|【回应|$)/);
      const oldStrategy = raw.match(/【策略[:：\s]*([\s\S]+?)】(?=\s*【回应|$)/);
      const oldResp = raw.match(/【回应[:：\s]*([\s\S]+)$/);
      if (oldResp) {
        response = oldResp[1].trim();
        intent = oldIntent?.[1]?.trim() || '未判断';
        strategy = oldStrategy?.[1]?.trim() || '未说明';
      } else if (oldIntent || oldStrategy) {
        response = raw.replace(/【意图[:：\s]*[\s\S]*?】(?=\s*【策略|【回应|$)/g,'')
                     .replace(/【策略[:：\s]*[\s\S]*?】(?=\s*【回应|$)/g,'')
                     .replace(/【回应[:：\s]*/g,'').trim();
        intent = oldIntent?.[1]?.trim() || '未判断';
        strategy = oldStrategy?.[1]?.trim() || '未说明';
      }
    }
    // 安全阀：回应太短或太长说明解析失败
    if (response.length < 8) { response = raw; intent = '未判断'; strategy = '未说明'; }
    if (intent.length > 80) intent = intent.substring(0, 77) + '...';
    if (strategy.length > 80) strategy = strategy.substring(0, 77) + '...';
    return {
      standard,
      designed: {
        judgment: { intent: intent, strategy: strategy },
        response,
      }
    };
  } catch (e) {
    console.error('API error:', e);
    return { error: e.message || '未知错误' };
  }
}

function recordVote(idx, choice) {
  const msgs = standardMessages.filter(m => m._pairIndex === idx);
  if (!msgs.length) return;
  const pair = msgs[0]._pairData;
  if (!pair || pair.vote) return;
  pair.vote = choice;
  votes[choice]++;
  // 同步更新sessionLog
  const entry = sessionLog.find(e => e.round === idx + 1);
  if (entry) entry.vote = choice === 'standard' ? 'A' : 'B';
  render();
}

// ── Reset ──
function resetState() {
  state = 'welcome';
  round = 0;
  standardMessages = [{ role: 'system', content: STANDARD_SYSTEM }];
  designedMessages = [{ role: 'system', content: DESIGNED_SYSTEM }];
  votes = { standard: 0, designed: 0 };
  currentMood = '';
  sessionLog = [];
  sessionStart = '';
}

function exportData() {
  if (!sessionLog.length) return;
  const rows = [
    ['会话开始', sessionStart],
    ['总轮次', sessionLog.length],
    ['选A次数', votes.standard],
    ['选B次数', votes.designed],
    ['结束感受', currentMood || '未选'],
    ['文字反馈', document.getElementById('feedbackText')?.value || ''],
    [''],
    ['轮次', '时间', '用户输入', '回应A(标准AI)', '回应B(设计AI)', '设计意图', '设计策略', '用户选择'],
  ];
  sessionLog.forEach(e => {
    rows.push([
      e.round, e.time, csvEscape(e.userInput), csvEscape(e.responseA),
      csvEscape(e.responseB), e.designIntent, e.designStrategy, e.vote || '未投'
    ]);
  });
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'ai-dialogue-data-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
  URL.revokeObjectURL(url);
}

function csvEscape(s) {
  if (!s) return '';
  return '"' + s.replace(/"/g, '""').replace(/\n/g, ' ') + '"';
}

function stripMarkdown(s) {
  // 去掉**粗体** *斜体* `代码` 等markdown标记，保留文字
  return s
    .replace(/\*\*(.+?)\*\*/g, '$1')
    .replace(/\*(.+?)\*/g, '$1')
    .replace(/`(.+?)`/g, '$1')
    .replace(/^[#]{1,6}\s+/gm, '')
    .replace(/^[-*]\s+/gm, '• ');
}

function showError(msg) {
  const area = document.getElementById('loadingArea');
  if (!area) return;
  const errMsg = msg || '未知网络错误';
  area.innerHTML = '<div style="text-align:center;padding:16px;border:1px solid #e0d4cf;border-radius:8px;background:#fdfaf8;"><p style="color:var(--muted);font-size:13px;margin-bottom:4px;">出了点问题</p><p style="color:var(--light);font-size:11px;">' + escapeHtml(errMsg) + '</p><p style="color:var(--light);font-size:11px;">刷新页面试试，或者换一个预设句子</p></div>';
}

// ── Key management ──
function openKeyModal() {
  document.getElementById('keyModal').classList.add('show');
  document.getElementById('keyInput').focus();
}
function saveKey() {
  const val = document.getElementById('keyInput').value.trim();
  if (!val) return;
  userKey = val;
  sessionStorage.setItem('ds_key', val);
  document.getElementById('keyModal').classList.remove('show');
  render();
}

// ── Utils ──
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Init ──
render();
</script>
